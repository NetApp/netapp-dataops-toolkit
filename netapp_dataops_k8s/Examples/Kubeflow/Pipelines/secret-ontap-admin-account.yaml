apiVersion: v1
kind: Secret
metadata:
  name: ontap-admin-account
  namespace: admin # Replace with desired Kubeflow namespace
data:
  username: <your_ontap_cluster_or_svm_admin_username_encoded_in_base64>
  password: <your_ontap_cluster_or_svm_admin_password_encoded_in_base64>
  # Optional: base64-encoded path to a CA certificate file on the pod/node filesystem
  # for ONTAP API SSL verification. If omitted, the system CA bundle is used.
  # For self-signed ONTAP certificates, download the cert and set this to its path.
  # Example: echo -n "/etc/ssl/certs/ontap_cert.pem" | base64
  # sslcertpath: <base64-encoded-path-to-cert-file>