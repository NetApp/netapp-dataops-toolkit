# Toolkit config and ONTAP credentials for Dataset Manager.
#
# Only config.json is mounted as a file in the pod. username and password are
# injected as temporary ONTAP_USERNAME / ONTAP_PASSWORD environment variables via
# secretKeyRef in jupyterlab-deployment.yaml (both unset after the keyring is populated;
# not written to disk as files).
#
# Edit values, then: kubectl apply -f netapp-dataops-secret.yaml
#
# Prefer creating from local files so secrets are not committed to git:
#   kubectl create secret generic netapp-dataops-config \
#     --namespace=data-science \
#     --from-file=config.json=../config.json \
#     --from-literal=username=vsadmin \
#     --from-literal=password='CHANGEME'
apiVersion: v1
kind: Secret
metadata:
  name: netapp-dataops-config
  namespace: data-science
type: Opaque
stringData:
  username: vsadmin
  password: CHANGEME
  config.json: |
    {
        "connectionType": "ONTAP",
        "hostname": "10.0.0.10",
        "svm": "svm1",
        "dataLif": "10.0.0.11",
        "sslCertPath": "",
        "defaultVolumeType": "flexgroup",
        "defaultExportPolicy": "default",
        "defaultSnapshotPolicy": "none",
        "defaultUnixUID": "1000",
        "defaultUnixGID": "100",
        "defaultUnixPermissions": "0770",
        "defaultAggregate": "",
        "datasetManagerEnabled": true,
        "datasetManagerRootVolume": "dataset_mgr_root",
        "datasetManagerRootMountpoint": "/home/jovyan/work/datasets"
    }
